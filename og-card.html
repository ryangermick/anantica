<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; display: flex; align-items: center; background: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; }
  .container { display: flex; align-items: center; width: 100%; padding: 0 80px; gap: 60px; }
  .photo { width: 260px; height: 260px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .text { display: flex; flex-direction: column; gap: 16px; }
  .name { font-family: 'Monoton', cursive; font-size: 72px; color: #000; line-height: 1.1; letter-spacing: -1px; }
  .accent { width: 60px; height: 3px; background: #a855f7; border-radius: 2px; }
  .tagline { font-size: 24px; color: #9ca3af; font-weight: 300; }
</style>
</head>
<body>
  <div class="container">
    <img class="photo" src="anantica.jpg" alt="">
    <div class="text">
      <div class="name">anantica.com</div>
      <div class="accent"></div>
      <div class="tagline">Clay, community, and what comes next.</div>
    </div>
  </div>
</body>
</html>
