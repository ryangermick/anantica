<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" ry="80" fill="#fafaf9"/>
  <g fill="none" stroke="#1c1917" stroke-width="16" stroke-linecap="round">
    <!-- Concentric "a": arches over top, left legs stop at a shared baseline, right legs extend down -->
    
    <!-- Outermost -->
    <path d="M156,280 L156,210 A100,100 0 0,1 356,210 L356,400"/>
    
    <!-- 2nd -->
    <path d="M190,280 L190,218 A66,66 0 0,1 322,218 L322,400"/>
    
    <!-- 3rd -->
    <path d="M224,280 L224,230 A32,32 0 0,1 288,230 L288,400"/>
    
    <!-- Innermost — just the right stem with tiny cap -->
    <line x1="256" y1="256" x2="256" y2="400"/>
  </g>
</svg>